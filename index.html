<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="loja_do_brasil.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Loja do Brasil</title>
</head>

<body class="montserrat">
  <header>
    <h1>Loja do Brasil</h1>
    <input type="text" placeholder="Buscar produtos..." class="search-bar" />
  </header>

  <nav class="categories">
    <ul>
      <li><a href="#">Eletrônicos</a></li>
      <li><a href="#">Roupas</a></li>
      <li><a href="#">Livros</a></li>
      <li><a href="#">Casa</a></li>
      <li><a href="#">Esportes</a></li>
    </ul>
  </nav>

  <main class="products">
    <h2 id="destaque">Produtos em destaque</h2>
    <div class="product-grid">
      <div class="product-card">
        <p></p>
        <img src="https://raw.githubusercontent.com/hdpngworld/HPW/main/uploads/6503856f94473-iPhone%2015%20Pro.png"
          alt="Produto 1" />
          <div>
            <h3>Smartphone XYZ</h3>
            <p>R$ 1.999,00</p>
          </div>
      </div>
      <div class="product-card">
        <p></p>
        <img
          src="https://benchpromos.com.br/_next/image?url=https%3A%2F%2Facerstore.vtexassets.com%2Farquivos%2Fids%2F161729-1200-auto%3Fv%3D638024224749900000%26width%3D1200%26height%3Dauto%26aspect%3Dtrue&w=3840&q=75"
          alt="Produto 2" />
        <div>
          <h3>Notebook ABC</h3>
          <p>R$ 3.499,00</p>
        </div>
      </div>
      <div class="product-card">
        <p></p>
        <img
          src="https://iguatemi365.vtexassets.com/unsafe/963x1440/center/middle/https%3A%2F%2Figuatemi365.vtexassets.com%2Farquivos%2Fids%2F576774%2FPRL_211027_001_0003-01.jpg%3Fv%3D638156746342900000"
          alt="Produto 3" />
        <div>
          <h3>Camisa Polo</h3>
          <p>R$ 79,90</p>
        </div>
      </div>
      <div class="product-card">
        <p></p>
        <img src="https://livrodireto.com/wp-content/uploads/2023/03/FICCAO-COM-CHAT-GPT-300-2.png.webp" alt="Produto 4" />
        <div>
          <h3>Livro de Ficção</h3>
          <p>R$ 39,90</p>
        </div>
      </div>
      <div class="product-card">
        <p></p>
        <img src="https://d2u2qhufg0q9tn.cloudfront.net/assets/arquivos/imgDetProduto_1c8812e5-4511-4009-9dd6-46fcf3ea8579_cafeteira-30-em-alta.png" alt="Produto 5" />
        <div>
          <h3>Cafeteira Elétrica</h3>
          <p>R$ 249,00</p>
        </div>
      </div>
      <div class="product-card">
        <p></p>
        <img src="https://imgs.casasbahia.com.br/1566541151/1xg.jpg" alt="Produto 6" />
        <div>
          <h3>Bola de Futebol</h3>
          <p>R$ 89,90</p>
        </div>
      </div>
    </div>
  </main>
</body>

</html>
